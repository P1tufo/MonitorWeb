<!-- MODALS -->
<!-- Modal: Area Uso -->
<div id="modalArea" class="modal-overlay">
    <div class="modal-content">
        <div class="modal-header" style="flex-wrap: wrap;">
            <h2 id="modalAreaTitle" style="margin-right: auto;">Consumo Específico</h2>
            <div class="modal-toggle-group" style="display: flex; gap: 5px; background: rgba(0,0,0,0.2); padding: 4px; border-radius: 6px; margin-right: 15px;">
                <button id="btnAreaToggleYear" class="btn btn-secondary active" style="padding: 4px 10px; font-size: 0.8rem;" onclick="toggleModalFilter('area', false)">Año</button>
                <button id="btnAreaToggleMonth" class="btn btn-secondary" style="padding: 4px 10px; font-size: 0.8rem;" onclick="toggleModalFilter('area', true)">Mes Actual</button>
            </div>
            <button class="close-btn" aria-label="Cerrar ventana" onclick="closeModal('modalArea')">&times;</button>
        </div>
        <div class="modal-body">
            <ul class="rank-list" id="modalAreaList" style="max-height: 60vh; overflow-y: auto;">
                <!-- JS injected -->
            </ul>
        </div>
    </div>
</div>

<!-- Modal: Detalle de Movimientos No Paletizados -->
<div id="modalNonPalletized" class="modal-overlay">
    <div class="modal-content" style="max-width: 900px; width: 90%; background: #0b111e; border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 20px 50px rgba(0,0,0,0.6); border-radius: 12px;">
        <div class="modal-header" style="border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 1rem;">
            <h2 id="modalNonPalletizedTitle" style="color: #f8f9fa; margin: 0; font-size: 1.25rem; display: flex; align-items: center; gap: 8px;">
                <i class="fas fa-exclamation-triangle" style="color: var(--naranja);"></i> Detalle de Movimientos No Paletizados
            </h2>
            <button class="close-btn" aria-label="Cerrar ventana" onclick="closeModal('modalNonPalletized')" style="background: none; border: none; color: #94a3b8; font-size: 1.5rem; cursor: pointer; transition: color 0.2s;">&times;</button>
        </div>
        <div class="modal-body" style="padding-top: 1rem;">
            <div id="modalNonPalletizedMeta" style="background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); padding: 0.75rem 1rem; border-radius: 8px; margin-bottom: 1rem; font-size: 0.9rem; color: #cbd5e1; display: flex; gap: 1.5rem; flex-wrap: wrap;">
                <div>Usuario: <strong id="lblModalUser" style="color: var(--calipso);"></strong></div>
                <div>Clase Movimiento: <strong id="lblModalClaseMov" style="color: #f87171;"></strong></div>
                <div>Registros cargados: <strong id="lblModalCount" style="color: #34d399;"></strong></div>
            </div>
            
            <div id="modalNonPalletizedLoading" style="text-align: center; padding: 3rem 0; color: #94a3b8;">
                <i class="fas fa-spinner fa-spin fa-2x" style="color: var(--primary); margin-bottom: 1rem;"></i>
                <p>Cargando registros detallados...</p>
            </div>
            
            <div id="modalNonPalletizedContainer" class="table-container" style="max-height: 55vh; overflow-y: auto; display: none;">
                <table style="color: #e2e8f0; width: 100%;">
                    <thead>
                        <tr>
                            <th>Doc. Material</th>
                            <th>Pos</th>
                            <th>Material</th>
                            <th>Cantidad</th>
                            <th>Almacén</th>
                            <th>Centro</th>
                            <th>Fecha Contable</th>
                        </tr>
                    </thead>
                    <tbody id="modalNonPalletizedTableBody">
                        <!-- JS injected -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
